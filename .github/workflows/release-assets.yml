name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to upload zip to (for manual retries)
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package extension
        run: pnpm package

      - name: Rename release zip
        id: create_zip
        run: |
          VERSION="${TAG_NAME#likes-to-go-v}"
          ZIP_NAME="likes-to-go-browser-extension-${VERSION}.zip"
          mv .output/likes-to-go-*-chrome.zip "${ZIP_NAME}"
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"
        env:
          TAG_NAME: ${{ inputs.tag }}

      - name: Upload zip asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: ${{ steps.create_zip.outputs.zip_name }}
          fail_on_unmatched_files: true

name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to upload zip to (for manual retries)
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm build

      - name: Create chrome-mv3 release zip
        id: create_zip
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          ZIP_NAME="likes-to-go-browser-extension-${VERSION}.zip"
          cd .output/chrome-mv3
          zip -r "../../${ZIP_NAME}" .
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload zip asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.release.tag_name }}
          files: ${{ steps.create_zip.outputs.zip_name }}
          fail_on_unmatched_files: true
